name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  DATASET_ARTIFACT_NAME: datasets-last-good

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'push' || (github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message || '', '[skip ci]'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
        env:
          HUSKY: '0'

      - name: Download latest refresh artifact
        uses: dawidd6/action-download-artifact@v11
        with:
          workflow: data-refresh.yml
          branch: main
          name: ${{ env.DATASET_ARTIFACT_NAME }}
          search_artifacts: true
          path: .artifact-restore
          if_no_artifact_found: fail

      - name: Copy artifact datasets into workspace
        run: |
          set -euo pipefail
          SRC=""
          if [ -f ".artifact-restore/public/datasets/summary.json" ]; then
            SRC=".artifact-restore/public/datasets"
          elif [ -f ".artifact-restore/datasets/summary.json" ]; then
            SRC=".artifact-restore/datasets"
          elif [ -f ".artifact-restore/summary.json" ]; then
            SRC=".artifact-restore"
          fi
          if [ -z "$SRC" ]; then
            echo "datasets artifact could not be resolved into public/datasets."
            exit 1
          fi
          rm -rf public/datasets
          mkdir -p public/datasets
          cp -R "$SRC"/. public/datasets/
          test -f public/datasets/summary.json
          test -f public/datasets/status/runs.jsonl

      - name: Rebuild datasets from stored snapshot
        run: bun run pipeline:rebuild
        env:
          GITHUB_SHA: ${{ github.sha }}
          PIPELINE_RUN_CONTEXT: deploy_push_stored

      - name: Validate pipeline snapshot outputs
        run: |
          test -f public/datasets/schools_official_de.meta.json
          test -f public/datasets/schools_osm_de.meta.json
          test -f public/datasets/jedeschule_stats.json

      - name: Remove processing-only artifacts before build
        run: |
          rm -f public/datasets/jedeschule-latest.csv
          rm -rf public/datasets/.pipeline

      - run: bun run build
        env:
          VITE_OSM_OAUTH_CLIENT_ID: ${{ secrets.VITE_OSM_OAUTH_CLIENT_ID }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  verify-compression:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Probe response compression headers
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          set -e
          DATASET_URL="${PAGE_URL%/}/datasets/BW/schools_matches_map.json"
          echo "Testing ${DATASET_URL}"
          echo "--- HEAD with Accept-Encoding: br,gzip ---"
          curl -sSI -H "Accept-Encoding: br,gzip" "$DATASET_URL" | tee /tmp/headers.txt
          echo "--- Compression verdict ---"
          if rg -i "content-encoding:\s*(br|gzip)" /tmp/headers.txt >/dev/null; then
            echo "Compression appears active."
          else
            echo "No content-encoding header observed for this dataset URL."
          fi
